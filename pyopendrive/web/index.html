<!DOCTYPE html>
<html lang="en">
  <head>
    <title>pyopendrive Map Editor</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="OpenDRIVE editor powered by pyopendrive, MapLibre GL, and maplibre-gl-geo-editor."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@geoman-io/maplibre-geoman-free@0.7.1/dist/maplibre-geoman.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl-geo-editor@0.7.3/style.css" />
    <link rel="stylesheet" href="./fonts/font-awesome.min.css" />
    <link rel="stylesheet" href="./fonts/bootstrap.min.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #f3f4f1;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      #toolbar {
        position: absolute;
        top: 12px;
        left: 56px;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        max-width: calc(100% - 420px);
        padding: 8px;
        border: 1px solid rgba(20, 24, 28, 0.16);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 22px rgba(20, 24, 28, 0.12);
      }

      #toolbar button,
      #toolbar label {
        height: 34px;
        margin: 0;
        white-space: nowrap;
      }

      #toolbar .btn {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      #status {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 2;
        max-width: min(520px, calc(100% - 24px));
        padding: 8px 10px;
        border: 1px solid rgba(20, 24, 28, 0.16);
        border-radius: 6px;
        color: #1f2933;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 8px 22px rgba(20, 24, 28, 0.12);
        font-size: 13px;
      }

      #xodr_file_input {
        display: none;
      }

      @media (max-width: 780px) {
        #toolbar {
          left: 8px;
          right: 8px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="toolbar">
      <input id="xodr_file_input" type="file" accept=".xodr,.xml" />
      <label for="xodr_file_input" class="btn btn-primary btn-sm">
        <i class="fa fa-upload"></i>
        Open .xodr
      </label>
      <button id="save_xodr_btn" type="button" class="btn btn-success btn-sm">
        <i class="fa fa-save"></i>
        Save .xodr
      </button>
      <button id="fit_btn" type="button" class="btn btn-default btn-sm">
        <i class="fa fa-crosshairs"></i>
        Fit
      </button>
      <button id="reload_btn" type="button" class="btn btn-default btn-sm">
        <i class="fa fa-refresh"></i>
        Reload
      </button>
    </div>
    <div id="status">Loading OpenDRIVE network...</div>

    <script type="module">
      import maplibregl from "https://esm.sh/maplibre-gl@5.7.1";
      import { Geoman } from "https://esm.sh/@geoman-io/maplibre-geoman-free@0.7.1";
      import { GeoEditor } from "https://esm.sh/maplibre-gl-geo-editor@0.7.3";

      const status = document.getElementById("status");
      const fileInput = document.getElementById("xodr_file_input");
      const saveButton = document.getElementById("save_xodr_btn");
      const fitButton = document.getElementById("fit_btn");
      const reloadButton = document.getElementById("reload_btn");

      let geoEditor = null;
      let currentFilename = "network.xodr";
      let currentGeoJson = {
        type: "FeatureCollection",
        features: [],
      };

      const map = new maplibregl.Map({
        container: "map",
        style: "https://demotiles.maplibre.org/style.json",
        center: [-85.31, 35.05],
        zoom: 14,
        attributionControl: true,
      });

      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-left");
      map.addControl(new maplibregl.ScaleControl({ unit: "metric" }), "bottom-left");

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError ? "#8a1f11" : "#1f2933";
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || response.statusText);
        }
        return payload;
      }

      function downloadText(filename, text, type = "application/xml") {
        const link = document.createElement("a");
        link.download = filename;
        link.href = URL.createObjectURL(new Blob([text], { type }));
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        setTimeout(() => {
          document.body.removeChild(link);
          URL.revokeObjectURL(link.href);
        }, 1000);
      }

      function fitToGeoJson(geojson) {
        const coords = geojson.features.flatMap((feature) => {
          if (feature.geometry?.type !== "LineString") return [];
          return feature.geometry.coordinates;
        });
        if (coords.length === 0) return;
        const bounds = coords.reduce(
          (box, coord) => box.extend(coord),
          new maplibregl.LngLatBounds(coords[0], coords[0])
        );
        map.fitBounds(bounds, { padding: 60, duration: 500 });
      }

      function setRoadSource(geojson) {
        currentGeoJson = geojson;
        if (map.getSource("opendrive-roads")) {
          map.getSource("opendrive-roads").setData(geojson);
        } else {
          map.addSource("opendrive-roads", {
            type: "geojson",
            data: geojson,
          });
          map.addLayer({
            id: "opendrive-road-casing",
            type: "line",
            source: "opendrive-roads",
            paint: {
              "line-color": "#243447",
              "line-width": 7,
              "line-opacity": 0.55,
            },
          });
          map.addLayer({
            id: "opendrive-roads",
            type: "line",
            source: "opendrive-roads",
            paint: {
              "line-color": "#f2b705",
              "line-width": 3,
            },
          });
        }
      }

      function loadIntoEditor(geojson) {
        if (!geoEditor) return;
        geoEditor.loadGeoJson(geojson);
        setRoadSource(geojson);
      }

      function editorFeatureCollection() {
        if (geoEditor && typeof geoEditor.getAllFeatureCollection === "function") {
          return geoEditor.getAllFeatureCollection();
        }
        return currentGeoJson;
      }

      async function loadNetwork() {
        setStatus("Loading OpenDRIVE network...");
        const payload = await requestJson("/api/network");
        currentFilename = payload.filename || "network.xodr";
        loadIntoEditor(payload.geojson);
        fitToGeoJson(payload.geojson);
        setStatus(
          `Loaded ${currentFilename}: ${payload.geojson.features.length} editable roads from pyopendrive.`
        );
      }

      async function openXodrFile(file) {
        if (!file) return;
        setStatus(`Reading ${file.name}...`);
        const text = await file.text();
        const payload = await requestJson("/api/load-xodr", {
          method: "POST",
          body: JSON.stringify({ filename: file.name, xodr: text }),
        });
        currentFilename = payload.filename || file.name;
        loadIntoEditor(payload.geojson);
        fitToGeoJson(payload.geojson);
        setStatus(
          `Loaded ${currentFilename}: ${payload.geojson.features.length} editable roads geocoded with convertXY2LonLat.`
        );
      }

      async function saveEditedXodr() {
        setStatus("Saving edited OpenDRIVE network...");
        const geojson = editorFeatureCollection();
        const payload = await requestJson("/api/save-xodr", {
          method: "POST",
          body: JSON.stringify({ geojson }),
        });
        currentFilename = payload.saved_filename || `edited_${currentFilename}`;
        loadIntoEditor(payload.geojson);
        downloadText(currentFilename, payload.xodr);
        setStatus(`Saved ${currentFilename} from ${payload.geojson.features.length} edited roads.`);
      }

      map.on("load", () => {
        const geoman = new Geoman(map, {});
        map.on("gm:loaded", () => {
          geoEditor = new GeoEditor({
            position: "top-right",
            toolbarOrientation: "vertical",
            columns: 2,
            drawModes: ["line"],
            editModes: ["select", "drag", "change", "delete", "copy", "split", "simplify", "lasso"],
            fileModes: [],
            fitBoundsOnLoad: true,
            enableAttributeEditing: true,
            attributePanelPosition: "right",
            attributePanelWidth: 320,
            attributePanelTitle: "OpenDRIVE Road",
            attributeSchema: {
              line: [
                { name: "road_id", label: "Road ID", type: "string", required: true },
                { name: "name", label: "Name", type: "string" },
                { name: "junction", label: "Junction", type: "string" },
              ],
            },
            onFeatureCreate: (feature) => {
              feature.properties = {
                ...(feature.properties || {}),
                feature_type: "road",
                road_id: feature.properties?.road_id || `new_${Date.now()}`,
                source: "maplibre-gl-geo-editor",
              };
              setRoadSource(editorFeatureCollection());
            },
            onFeatureEdit: () => setRoadSource(editorFeatureCollection()),
            onFeatureDelete: () => setRoadSource(editorFeatureCollection()),
            onGeoJsonLoad: (result) => {
              if (result?.features) {
                setRoadSource({
                  type: "FeatureCollection",
                  features: result.features,
                });
              }
            },
          });
          geoEditor.setGeoman(geoman);
          map.addControl(geoEditor, "top-right");
          loadNetwork().catch((error) => setStatus(error.message, true));
        });
      });

      fileInput.addEventListener("change", () => {
        openXodrFile(fileInput.files[0]).catch((error) => setStatus(error.message, true));
        fileInput.value = "";
      });
      saveButton.addEventListener("click", () => {
        saveEditedXodr().catch((error) => setStatus(error.message, true));
      });
      fitButton.addEventListener("click", () => fitToGeoJson(editorFeatureCollection()));
      reloadButton.addEventListener("click", () => {
        loadNetwork().catch((error) => setStatus(error.message, true));
      });
    </script>
  </body>
</html>
