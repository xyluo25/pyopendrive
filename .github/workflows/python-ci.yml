name: Python CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" pylint

      - name: Run tests
        run: python -m pytest -q

      - name: Run pylint report
        run: |
          python -m pylint pyopendrive tests --reports=y --output-format=text > pylint-report-${{ matrix.python-version }}.txt || true

      - name: Upload pylint report
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report-python-${{ matrix.python-version }}
          path: pylint-report-${{ matrix.python-version }}.txt
          if-no-files-found: error
